apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: mekong-salinity
    component: frontend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mekong-salinity
      component: frontend
  template:
    metadata:
      labels:
        app: mekong-salinity
        component: frontend
        version: v1
    spec:
      containers:
        - name: frontend
          image: mekong-salinity-frontend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: mekong-salinity-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
