apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: mekong-salinity
    component: backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mekong-salinity
      component: backend
  template:
    metadata:
      labels:
        app: mekong-salinity
        component: backend
        version: v1
    spec:
      containers:
        - name: backend
          image: mekong-salinity-backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mekong-salinity-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mekong-salinity-secrets
                  key: SECRET_KEY
            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: mekong-salinity-config
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: mekong-salinity-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: backend-uploads-pvc
