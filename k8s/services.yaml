apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: mekong-salinity
    component: backend
spec:
  type: ClusterIP
  selector:
    app: mekong-salinity
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: mekong-salinity
    component: frontend
spec:
  type: NodePort
  selector:
    app: mekong-salinity
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: mekong-salinity
    component: database
spec:
  type: ClusterIP
  selector:
    app: mekong-salinity
    component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
